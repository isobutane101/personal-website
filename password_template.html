<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>/*[|template_title|]*/0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Adi Desai's portfolio website." />
    <meta name="robots" content="nosnippet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 18px;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            -moz-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-input {
            padding: 1rem 1.25rem;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            text-align: center;
            letter-spacing: 0.1em;
            transition: border-color 0.2s;
        }

        .login-input:focus {
            outline: none;
            border-color: #c9a227;
        }

        .login-input::placeholder {
            color: #666;
        }

        .login-button {
            padding: 1rem 1.25rem;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: #c9a227;
            border: none;
            border-radius: 4px;
            color: #1a1a1a;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-button:hover {
            background: #b8922a;
        }

        .login-error {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #888;
            font-size: 0.875rem;
        }

        .staticrypt-remember input[type="checkbox"] {
            transform: scale(1.2);
            accent-color: #c9a227;
        }

        .hidden {
            display: none !important;
        }

        .staticrypt-spinner-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25em solid #333;
            border-right-color: #c9a227;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="staticrypt_loading" class="staticrypt-spinner-container">
        <div class="staticrypt-spinner"></div>
    </div>

    <div id="staticrypt_content" class="login-container hidden">
        <h1 class="login-name">adi desai</h1>
        <p class="login-subtitle">Portfolio</p>

        <form id="staticrypt-form" class="login-form" action="#" method="post">
            <input
                id="staticrypt-password"
                type="password"
                class="login-input"
                name="password"
                placeholder="/*[|template_placeholder|]*/0"
                autocomplete="off"
                autofocus
            >

            <input id="staticrypt-remember" type="checkbox" name="remember" checked class="hidden" />

            <input type="submit" class="login-button" value="Enter" />

            <p class="login-error" id="errorMsg">/*[|template_error|]*/0</p>
        </form>
    </div>

    <script>
        const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
        const templateError = "/*[|template_error|]*/0",
            isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
            staticryptConfig = /*[|staticrypt_config|]*/ 0;

        const templateConfig = {
            rememberExpirationKey: "staticrypt_expiration",
            rememberPassphraseKey: "staticrypt_passphrase",
            replaceHtmlCallback: null,
            clearLocalStorageCallback: null,
        };

        const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

        window.onload = async function () {
            // first try localStorage (remember me)
            const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

            if (isSuccessful) return;

            // then try sessionStorage (same session, no remember me needed)
            const sessionPass = sessionStorage.getItem("staticrypt_session_password");
            if (sessionPass) {
                const result = await staticrypt.handleDecryptionOfPage(sessionPass, false);
                if (result.isSuccessful) return;
            }

            // show password prompt
            document.getElementById("staticrypt_loading").classList.add("hidden");
            document.getElementById("staticrypt_content").classList.remove("hidden");
            document.getElementById("staticrypt-password").focus();
        };

        document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const password = document.getElementById("staticrypt-password").value;

            const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, true);

            if (isSuccessful) {
                // save password in sessionStorage so other pages auto-decrypt
                sessionStorage.setItem("staticrypt_session_password", password);
            } else {
                const errorEl = document.getElementById("errorMsg");
                errorEl.classList.add("show");
                document.getElementById("staticrypt-password").value = "";
                setTimeout(() => errorEl.classList.remove("show"), 2000);
            }
        });
    </script>
</body>
</html>
