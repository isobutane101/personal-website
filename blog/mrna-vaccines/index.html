        }

            justify-content: center;

            color: #888;
            font-size: 0.875rem;

            accent-color: #c9a227;
        }

        .hidden {

        }

            display: flex;
            align-items: center;
            justify-content: center;
        }

            border-right-color: #c9a227;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% { transform: rotate(360deg); }
        }
